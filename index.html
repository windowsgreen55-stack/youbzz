<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YouBzz</title>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0a0a0a;
    color:#eee;
}

header {
    background:#1a1a1a;
    border-bottom:2px solid #333;
    padding:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo img { height:35px; }

.profile {
    display:flex;
    align-items:center;
    gap:10px;
}

.profile img {
    width:32px;
    height:32px;
    border-radius:50%;
}

button {
    background:#2a2a2a;
    border:1px solid #444;
    color:white;
    padding:6px 10px;
    cursor:pointer;
}

.videos-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, 220px);
    gap:10px;
    padding:10px;
}

.video-card {
    background:#1a1a1a;
    border:1px solid #333;
    cursor:pointer;
    padding:5px;
}

.thumb {
    height:130px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#000;
    font-size:30px;
}

/* PLAYER PERFEITO */
.player-wrapper {
    position: relative;
    width: 100%;
    max-width: 900px;
    aspect-ratio: 16 / 9;
    background: black;
}

.player-wrapper video,
.player-wrapper iframe {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

textarea {
    width:100%;
    background:#111;
    color:white;
    border:1px solid #333;
}
</style>
</head>

<body>

<header>
    <div class="logo">
        <img src="YouBzz.png">
    </div>

    <div class="profile">
        <img id="avatar">
        <span id="username"></span>
        <button onclick="editProfile()">Edit</button>
        <button onclick="toggleUpload()">Upload</button>
    </div>
</header>

<div id="upload" style="display:none; padding:10px;">
    <h3>Add Video</h3>
    <input id="url" placeholder="video url">
    <input id="title" placeholder="title">
    <button onclick="add()">Add</button>
</div>

<div id="main">
    <div id="videos" class="videos-grid"></div>
</div>

<div id="watch" style="display:none; padding:10px;">
    <button onclick="back()">← Back</button>

    <div class="player-wrapper">
        <div id="player-container"></div>
    </div>

    <h2 id="vtitle"></h2>
    <p id="vowner"></p>

    <p>👁 <span id="views">0</span> | 👍 <span id="likes">0</span></p>
    <button onclick="like()">Like</button>

    <h3>Comments</h3>
    <textarea id="commentText"></textarea>
    <button onclick="comment()">Send</button>
    <div id="comments"></div>
</div>

<script>
// PERFIL
let profile = JSON.parse(localStorage.getItem("youbzzProfile"));

if(!profile){
    const name = prompt("Digite seu nome:");
    const avatar = prompt("Link da foto:");

    profile = {
        name: name || "User",
        avatar: avatar || "https://i.imgur.com/HeIi0wU.png"
    };

    localStorage.setItem("youbzzProfile", JSON.stringify(profile));
}

function updateProfile(){
    document.getElementById("username").innerText = profile.name;
    document.getElementById("avatar").src = profile.avatar;
}

function editProfile(){
    const name = prompt("Novo nome:", profile.name);
    const avatar = prompt("Nova foto:", profile.avatar);

    profile.name = name || profile.name;
    profile.avatar = avatar || profile.avatar;

    localStorage.setItem("youbzzProfile", JSON.stringify(profile));
    updateProfile();
}

updateProfile();

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDZWRwM3T-ejo3n-geNliqhFs6-i7I5fjk",
  authDomain: "youbzz-ce459.firebaseapp.com",
  databaseURL: "https://youbzz-ce459-default-rtdb.firebaseio.com",
  projectId: "youbzz-ce459",
  storageBucket: "youbzz-ce459.firebasestorage.app",
  messagingSenderId: "757941259095",
  appId: "1:757941259095:web:509e03cad0e629ee2d8c12"
};

firebase.initializeApp(firebaseConfig);
const videosRef = firebase.database().ref("videos");

let videos = [];
let currentVideoKey = null;

// REALTIME
videosRef.on("value", snap=>{
    const data = snap.val();
    videos = data ? Object.entries(data).map(([k,v])=>({key:k,...v})) : [];
    load();

    if(currentVideoKey){
        const v = videos.find(x=>x.key===currentVideoKey);
        if(v){
            document.getElementById("views").innerText = v.views || 0;
            document.getElementById("likes").innerText = v.likes || 0;
            document.getElementById("vowner").innerText = "Posted by: " + v.owner;

            const list = document.getElementById("comments");
            list.innerHTML="";
            (v.comments||[]).forEach(c=>{
                const d=document.createElement("div");
                d.innerText = c.user + ": " + c.text;
                list.appendChild(d);
            });
        }
    }
});

// ADD VIDEO
function add(){
    const url = document.getElementById("url").value;
    const title = document.getElementById("title").value || "Untitled";

    videosRef.push({
        title,
        videoUrl:url,
        owner: profile.name,
        views:0,
        likes:0,
        comments:[]
    });
}

// GRID
function load(){
    const container=document.getElementById("videos");
    container.innerHTML="";

    videos.forEach(v=>{
        const div=document.createElement("div");
        div.className="video-card";
        div.innerHTML=`
        <div class="thumb">▶</div>
        <div>${v.title}</div>
        <small>${v.owner}</small>`;
        div.onclick=()=>watch(v);
        container.appendChild(div);
    });
}

// PLAYER PERFEITO
function loadPlayer(url){
    const container=document.getElementById("player-container");
    container.innerHTML="";

    const video=document.createElement("video");
    video.controls=true;

    const source=document.createElement("source");
    source.src=url;

    if(url.includes(".mp4")) source.type="video/mp4";
    else if(url.includes(".webm")) source.type="video/webm";
    else if(url.includes(".mov")) source.type="video/quicktime";

    video.appendChild(source);

    video.onerror=()=>{
        container.innerHTML=`<iframe src="${url}"></iframe>`;
    };

    container.appendChild(video);
}

// WATCH
function watch(v){
    currentVideoKey = v.key;

    document.getElementById("main").style.display="none";
    document.getElementById("watch").style.display="block";

    loadPlayer(v.videoUrl);

    document.getElementById("vtitle").innerText=v.title;
    document.getElementById("vowner").innerText="Posted by: "+v.owner;

    videosRef.child(v.key).child("views")
    .transaction(x=>(x||0)+1);
}

// LIKE
function like(){
    videosRef.child(currentVideoKey).child("likes")
    .transaction(x=>(x||0)+1);
}

// COMMENT
function comment(){
    const text=document.getElementById("commentText").value;
    if(!text) return;

    videosRef.child(currentVideoKey).child("comments")
    .transaction(c=>{
        c=c||[];
        c.push({user: profile.name, text});
        return c;
    });

    document.getElementById("commentText").value="";
}

// BACK
function back(){
    document.getElementById("watch").style.display="none";
    document.getElementById("main").style.display="block";
}

// UI
function toggleUpload(){
    const el=document.getElementById("upload");
    el.style.display = el.style.display==="none"?"block":"none";
}
</script>

</body>
</html>
